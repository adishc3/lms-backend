<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Certificate</title>
  </head>
  <body>
    <h1>Certificate for {{ certificate.user.full_name or certificate.user.email }}</h1>
    <p>Course: {{ certificate.course.title }}</p>
    
    <p>Issued at: {{ certificate.issued_at }}</p>
    <p>Certificate ID: {{ certificate.certificate_id }}</p>
    <p><a href="/certificates/download/{{ certificate.certificate_id }}">Download PDF</a></p>
  </body>
</html>
