<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dashboard</title>
  </head>
  <body>
    <h1>Dashboard for {{ user.email }}</h1>
    <h2>Your Certificates</h2>
    <ul>
    {% for c in certificates %}
      <li><a href="/certificates/view/{{ c.certificate_id }}">{{ c.course.title }} ({{ c.issued_at }})</a></li>
    {% else %}
      <li>No certificates yet.</li>
    {% endfor %}
    </ul>
  </body>
</html>
